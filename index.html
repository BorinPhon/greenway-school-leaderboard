    /* Responsive */

  </style>

  <script>
    /* ════════════════════════════════════════════════════════════════════
       CONFIG - UPDATE THESE VALUES
    ════════════════════════════════════════════════════════════════════ */
    const SPREADSHEET_ID = '1SK7kWxD_mYWKqMJN_P2L5-8RGRwUylzX9SUXOiRevwM';
    const REFRESH_MS     = 1 * 60 * 1000;   // 1 minute between polls
    const PHOTO_STORE    = 'gws_student_photos_v2';

    // ── PHOTO UPLOAD CONFIG ──────────────────────────────────────────────────
    // IMPORTANT: Replace [YOUR_SCRIPT_URL_HERE] with your Google Apps Script URL
    // After deploying the script, copy the deployment URL and paste it here
    // Example: const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX/exec';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyexbNxU5hy-A54W7Tej3I-EsJP2l6ffzoqhF6MYq01-jyiiinasqxxhrz3rK5FENsqng/exec';

    // ── MULTI-MONTH CONFIG ──────────────────────────────────────────────────
    const MONTHS = [
      {
        label:          'January',
        spreadsheetId:  '1jeOXFdhK9vZiq6xng-z8m6yUpk9HA354BttDnFvAwFY',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
      {
        label:          'February',
        spreadsheetId:  '1VdWhQX5JXZFf4bmvIfLkKUJK8Ul68exAmDATMO_1S8g',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
      {
        label:          'March',
        spreadsheetId:  '1SK7kWxD_mYWKqMJN_P2L5-8RGRwUylzX9SUXOiRevwM',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      true
      },
      {
        label:          'April 2026',
        spreadsheetId:  '1967wzuDDk4gX5_oSl8R3eI1SeMEgVUWI-YirOpPm88M',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
    ];

    let activeMonthIdx = 2; // Start with March (index 2)

    /* ════════════════════════════════════════════════════════════════════
       DROPDOWN TOGGLE
    ════════════════════════════════════════════════════════════════════ */
    function toggleDropdown() {
      const menu = document.getElementById('monthDropdownMenu');
      menu.classList.toggle('show');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.month-dropdown')) {
        document.getElementById('monthDropdownMenu').classList.remove('show');
      }
    });

    /* ════════════════════════════════════════════════════════════════════
       LOCAL PHOTO STORAGE
    ════════════════════════════════════════════════════════════════════ */
    function loadPhotoStore() {
      try { return JSON.parse(localStorage.getItem(PHOTO_STORE) || '{}'); }
      catch { return {}; }
    }
    function savePhotoStore(store) {
      try { localStorage.setItem(PHOTO_STORE, JSON.stringify(store)); }
      catch (e) { console.warn('localStorage quota exceeded', e); }
    }
    function photoKey(sheetName, studentName) {
      return `${sheetName}||${studentName.trim()}`;
    }

    /* ════════════════════════════════════════════════════════════════════
       GOOGLE DRIVE PHOTO HELPER
    ════════════════════════════════════════════════════════════════════ */
    function driveUrlToDirectImg(url) {
      if (!url) return null;
      url = url.trim();
      if (!url.startsWith('http')) return null;
      let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
      m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
      m = url.match(/\/open\?id=([a-zA-Z0-9_-]+)/);
      if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
      m = url.match(/uc\?.*[?&]id=([a-zA-Z0-9_-]+)/);
      if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
      if (/\.(jpg|jpeg|png|gif|webp)/i.test(url)) return url;
      if (url.includes('lh3.googleusercontent.com')) return url;
      return null;
    }

    /* ════════════════════════════════════════════════════════════════════
       FETCH & PARSE A SHEET
    ════════════════════════════════════════════════════════════════════ */
    async function fetchSheet(sheetName, spreadsheetId) {
      const bust = Math.floor(Date.now() / 60000);
      const sid  = spreadsheetId || SPREADSHEET_ID;
      const url  = `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&_=${bust}`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} for sheet "${sheetName}"`);
      const text  = await res.text();
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
      if (!match) throw new Error(`Unexpected response for "${sheetName}"`);
      const json = JSON.parse(match[1]);
      if (json.status !== 'ok') throw new Error(`Sheet error: ${json.errors?.[0]?.message || 'unknown'}`);
      return parseGviz(json, sheetName);
    }

    /* ════════════════════════════════════════════════════════════════════
       PARSE GVIZ RESPONSE
    ════════════════════════════════════════════════════════════════════ */
    function parseGviz(json, sheetName) {
      const cols        = json.table.cols;
      const rows        = json.table.rows;
      const headerLabel = (cols[0]?.label || '').trim();

      let schoolName   = 'Greenway School';
      let period       = '';
      let academicYear = '';
      let levelName    = '';
      let teacher      = '';
      let preparedBy   = '';

      const schoolMatch = headerLabel.match(/^(.+?)\s+Top 5/i);
      if (schoolMatch) schoolName = schoolMatch[1].trim();

      const periodMatch = headerLabel.match(/Top 5 of\s+(.+?)\s+Academic Year/i);
      if (periodMatch) period = periodMatch[1].trim();
      else {
        const pm2 = headerLabel.match(/Top 5 of\s+(.+?)(?:\s+Level|\s*$)/i);
        if (pm2) period = pm2[1].trim();
      }

      const yearMatch = headerLabel.match(/Academic Year\s*[:\-]\s*(\S+)/i);
      if (yearMatch) academicYear = yearMatch[1].trim();

      const levelMatch = headerLabel.match(/Level:\s*(.+?)\s+N\s*$/i);
      if (levelMatch) levelName = levelMatch[1].trim();
      else {
        const lm2 = headerLabel.match(/Level:\s*(.+?)(?:\s+N)?$/i);
        if (lm2) levelName = lm2[1].trim();
      }

      const colIndex = {};
      cols.forEach((c, i) => {
        const lbl = (c.label || '').trim().toLowerCase().replace(/\s+/g,'');
        if      (lbl === 'studentname') colIndex.name   = i;
        else if (lbl === 'gender')      colIndex.gender = i;
        else if (lbl === 'average')     colIndex.avg    = i;
        else if (lbl === 'grade')       colIndex.grade  = i;
        else if (lbl === 'rank')        colIndex.rank   = i;
        else if (lbl === 'result')      colIndex.result = i;
      });
      cols.forEach((c, i) => {
        const lbl = (c.label || '').trim().toLowerCase().replace(/\s+/g,'');
        if (lbl === 'photourl' || lbl === 'photo' || lbl === 'photolink') colIndex.photo = i;
      });
      if (colIndex.name   === undefined) colIndex.name   = 1;
      if (colIndex.gender === undefined) colIndex.gender = 2;
      if (colIndex.avg    === undefined) colIndex.avg    = 3;
      if (colIndex.grade  === undefined) colIndex.grade  = 4;
      if (colIndex.rank   === undefined) colIndex.rank   = 5;
      if (colIndex.result === undefined) colIndex.result = 6;
      if (colIndex.photo  === undefined) colIndex.photo  = 7;
      colIndex.n = 0;

      const students = [];
      for (const row of rows) {
        const cells = row.c || [];
        const cv = (i) => { const c = cells[i]; return c ? (c.v ?? '') : ''; };
        const name = String(cv(colIndex.name)).trim();
        if (!name) continue;
        if (/^(date|seen|teacher|prepared)/i.test(name)) {
          const teacherMatch = name.match(/Teacher\s*[:\-]\s*(.+)/i);
          if (teacherMatch) teacher = teacherMatch[1].trim();
          const prepCol = String(cv(4) || cv(colIndex.result) || '').trim();
          if (prepCol && !/^(pass|fail)$/i.test(prepCol)) preparedBy = prepCol;
          continue;
        }
        const avgRaw  = cv(colIndex.avg);
        const avg     = avgRaw !== '' ? parseFloat(avgRaw) : null;
        const rankRaw = cv(colIndex.rank);
        const rank    = rankRaw !== '' ? Math.round(parseFloat(rankRaw)) : (students.length + 1);
        const rawPhoto = String(cv(colIndex.photo)).trim();
        const photoUrl = driveUrlToDirectImg(rawPhoto);
        students.push({
          n:      String(cv(colIndex.n)).trim(),
          name,
          gender: String(cv(colIndex.gender)).trim(),
          avg,
          grade:  String(cv(colIndex.grade)).trim(),
          rank,
          result: String(cv(colIndex.result)).trim(),
          photoUrl,
        });
      }

      for (const row of rows) {
        const cells = row.c || [];
        const cv = (i) => { const c = cells[i]; return c ? String(c.v ?? '').trim() : ''; };
        const col1 = cv(1);
        if (/Teacher\s*[:\-]/i.test(col1)) {
          teacher = col1.replace(/Teacher\s*[:\-]\s*/i, '').trim();
          const pb = cv(4);
          if (pb && !/^(pass|fail|result)$/i.test(pb)) preparedBy = pb;
        }
        if (/Prepared by/i.test(col1) || /Prepared by/i.test(cv(4))) {
          const pb = cv(4) || cv(1);
          if (pb && !/Prepared by/i.test(pb)) preparedBy = pb;
        }
      }

      return { sheetName, schoolName, period, academicYear, levelName, teacher, preparedBy, students };
    }

    /* ════════════════════════════════════════════════════════════════════
       RENDER HELPERS
    ════════════════════════════════════════════════════════════════════ */
    const rankEmoji = { 1: '🥇', 2: '🥈', 3: '🥉' };

    function gradeClass(g) {
      const map = { A:'grade-a', B:'grade-b', C:'grade-c', D:'grade-d', F:'grade-f' };
      return map[(g||'').toUpperCase()] || 'grade-f';
    }
    function resultBadge(result) {
      const r = (result || '').toLowerCase();
      if (r === 'pass') return `<span class="badge-pill badge-pass"><i class="bi bi-check-circle-fill me-1"></i>Pass</span>`;
      if (r === 'fail') return `<span class="badge-pill badge-fail"><i class="bi bi-x-circle-fill me-1"></i>Fail</span>`;
      return `<span class="badge-pill" style="background:#f3f4f6;color:#6b7280">${escHtml(result)}</span>`;
    }
    function genderLabel(g) {
      const l = (g || '').toLowerCase();
      if (l === 'female') return '<i class="bi bi-gender-female"></i> Female';
      if (l === 'male')   return '<i class="bi bi-gender-male"></i> Male';
      return escHtml(g) || '—';
    }
    function avgDisplay(avg) {
      if (avg === null || avg === undefined || isNaN(avg)) return '—';
      return avg.toFixed(2);
    }
    function escHtml(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function levelDisplay(levelName, sheetName) {
      if (!levelName) return sheetName;
      const l = levelName.toLowerCase();
      if (l.startsWith('beginner')) return levelName;
      return `Level ${levelName}`;
    }
    function fmtTime(d) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    function fmtDateTime(d) {
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' })
           + ' ' + fmtTime(d);
    }

    /* ════════════════════════════════════════════════════════════════════
       RENDER CARD
    ════════════════════════════════════════════════════════════════════ */
    function renderCard(s, sheetName) {
      const rankClass  = `rank-${Math.min(s.rank, 5)}`;
      const emoji      = rankEmoji[s.rank];
      const key        = photoKey(sheetName, s.name);
      const store      = loadPhotoStore();
      const localPhoto = store[key] || null;
      const displayUrl = localPhoto || s.photoUrl;

      const safeKey  = key.replace(/[^a-zA-Z0-9_-]/g, '_');
      const imgId    = `pi_${safeKey}`;
      const phId     = `ph_${safeKey}`;
      const uploadId = `up_${safeKey}`;

      const isDrivePhoto = !localPhoto && !!s.photoUrl;
      const photoContent = displayUrl
        ? `<img class="card-photo" id="${imgId}"
               src="${escHtml(displayUrl)}"
               alt="${escHtml(s.name)}"
               onerror="this.style.display='none';var p=document.getElementById('${phId}');if(p)p.style.display='flex'" />
           <div class="card-photo-placeholder" id="${phId}" style="display:none">
             <i class="bi bi-person-fill ph-icon"></i>
             <span class="ph-label">No Photo</span>
           </div>
           ${isDrivePhoto ? '<div class="drive-badge" title="Photo from Google Drive"><i class="bi bi-google"></i></div>' : ''}`
        : `<div class="card-photo-placeholder" id="${phId}">
             <i class="bi bi-person-fill ph-icon"></i>
             <span class="ph-label">Upload Photo</span>
           </div>`;

      const rankBadge = emoji
        ? `<div class="rank-badge">${emoji}</div>`
        : `<div class="rank-badge"><span class="rank-num">#${s.rank}</span></div>`;

      return `
        <div class="student-card ${rankClass}">
          <div class="card-accent"></div>
          <div class="card-photo-wrap"
               onclick="document.getElementById('${uploadId}').click()"
               title="Click to upload photo">
            ${photoContent}
            <div class="upload-overlay">
              <i class="bi bi-camera-fill"></i>
              <span>${isDrivePhoto ? 'Replace Photo' : 'Upload Photo'}</span>
            </div>
            ${rankBadge}
          </div>
          <input type="file" accept="image/*" class="upload-input"
                 id="${uploadId}"
                 data-key="${escHtml(key)}"
                 data-imgid="${imgId}"
                 data-phid="${phId}"
                 onchange="handleUpload(this)" />
          <div class="card-body-inner">
            <div class="card-name" title="${escHtml(s.name)}">${escHtml(s.name)}</div>
            <div class="card-divider"></div>
            <div class="card-score-row">
              <span class="card-avg">${avgDisplay(s.avg)}</span>
              <span class="card-avg-label">avg</span>
            </div>
            <div class="card-gender">${genderLabel(s.gender)}</div>
            <div class="card-badges">
              <span class="badge-pill ${gradeClass(s.grade)}">Grade ${escHtml(s.grade)}</span>
              ${resultBadge(s.result)}
            </div>
          </div>
        </div>`;
    }

    /* ════════════════════════════════════════════════════════════════════
       HANDLE PHOTO UPLOAD
    ════════════════════════════════════════════════════════════════════ */
    function setCardUploading(uploadId, uploading) {
      const input = document.getElementById(uploadId);
      if (!input) return;
      const wrap = input.closest('.card-photo-wrap') || input.parentElement;
      if (!wrap) return;
      let spinner = wrap.querySelector('.upload-spinner');
      if (uploading) {
        if (!spinner) {
          spinner = document.createElement('div');
          spinner.className = 'upload-spinner';
          spinner.innerHTML = '<div class="spinner-ring"></div><span>Uploading…</span>';
          wrap.appendChild(spinner);
        }
        spinner.style.display = 'flex';
      } else {
        if (spinner) spinner.style.display = 'none';
      }
    }

    function applyPhotoToCard(imgId, phId, url) {
      const imgEl = document.getElementById(imgId);
      const phEl  = document.getElementById(phId);
      if (imgEl) {
        imgEl.src = url;
        imgEl.style.display = 'block';
        if (phEl) phEl.style.display = 'none';
      } else if (phEl) {
        const newImg = document.createElement('img');
        newImg.className = 'card-photo';
        newImg.id  = imgId;
        newImg.src = url;
        newImg.alt = imgId;
        newImg.onerror = () => { newImg.style.display='none'; if(phEl) phEl.style.display='flex'; };
        phEl.parentNode.insertBefore(newImg, phEl);
        phEl.style.display = 'none';
      }
    }

    function handleUpload(input) {
      const file = input.files[0];
      if (!file) return;

      const key      = input.dataset.key;
      const imgId    = input.dataset.imgid;
      const phId     = input.dataset.phid;
      const uploadId = input.id;

      const parts       = key.split('||');
      const sheetName   = parts[0]  || '';
      const studentName = parts.slice(1).join('||') || '';

      const reader = new FileReader();
      reader.onload = async function(e) {
        const dataUrl = e.target.result;

        applyPhotoToCard(imgId, phId, dataUrl);

        const store = loadPhotoStore();
        store[key] = dataUrl;
        savePhotoStore(store);

        if (!SCRIPT_URL || SCRIPT_URL === '[YOUR_SCRIPT_URL_HERE]') {
          showToast('✅ Photo saved locally on this device.');
          return;
        }

        setCardUploading(uploadId, true);

        try {
          const resp = await fetch(SCRIPT_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sheetName,
              studentName,
              imageData: dataUrl,
              fileName:  file.name
            })
          });

          const result = await resp.json();

          if (result.success && result.photoUrl) {
            applyPhotoToCard(imgId, phId, result.photoUrl);

            store[key] = result.photoUrl;
            savePhotoStore(store);

            const imgEl = document.getElementById(imgId);
            if (imgEl) {
              const wrap = imgEl.closest('.card-photo-wrap');
              if (wrap && !wrap.querySelector('.drive-badge')) {
                const badge = document.createElement('div');
                badge.className = 'drive-badge';
                badge.title = 'Photo saved to Google Drive — visible to all visitors';
                badge.innerHTML = '<i class="bi bi-google"></i>';
                wrap.appendChild(badge);
              }
            }

            if (result.warning) {
              showToast('⚠️ Photo uploaded but student not found in sheet.');
            } else {
              showToast('✅ Photo saved to Google Drive — visible to everyone!');
            }
          } else {
            showToast('⚠️ Drive upload failed — photo saved locally only.');
            console.warn('Upload error:', result.error);
          }
        } catch (err) {
          showToast('⚠️ Could not reach upload server — photo saved locally only.');
          console.error('Upload fetch error:', err);
        } finally {
          setCardUploading(uploadId, false);
        }
      };
      reader.readAsDataURL(file);
    }

    /* ════════════════════════════════════════════════════════════════════
       MONTH NAVIGATION
    ════════════════════════════════════════════════════════════════════ */
    function buildMonthNav() {
      const btn = document.getElementById('monthDropdownBtn');
      const menu = document.getElementById('monthDropdownMenu');
      const current = MONTHS[activeMonthIdx];
      
      btn.innerHTML = `<i class="bi bi-calendar-event"></i> ${escHtml(current.label)} ${current.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}`;
      
      menu.innerHTML = MONTHS.map((m, idx) => `
        <div class="dropdown-item ${idx === activeMonthIdx ? 'active' : ''}" onclick="switchMonth(${idx}); return false;">
          <span>${escHtml(m.label)}</span>
          ${m.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}
        </div>
      `).join('');
    }

    async function switchMonth(idx) {
      if (idx === activeMonthIdx) return;
      activeMonthIdx = idx;
      buildMonthNav();
      document.getElementById('monthDropdownMenu').classList.remove('show');
      await loadAllData(false);
    }

    /* ════════════════════════════════════════════════════════════════════
       BUILD UI
    ════════════════════════════════════════════════════════════════════ */
    function buildGrid(students, sheetName) {
      const sorted = students.slice().sort((a, b) => a.rank - b.rank).slice(0, 5);
      return `<div class="cards-grid">${sorted.map(s => renderCard(s, sheetName)).join('')}</div>`;
    }

    function buildTabPane(classData, index) {
      const { sheetName, levelName, students, teacher, preparedBy } = classData;
      const displayName = levelDisplay(levelName, sheetName);
      const footerTeacher    = teacher    ? `<span><i class="bi bi-person-badge me-1"></i>Teacher: <strong>${escHtml(teacher)}</strong></span>` : '';
      const footerPreparedBy = preparedBy ? `<span><i class="bi bi-pencil-square me-1"></i>Checked by: <strong>${escHtml(preparedBy)}</strong></span>` : '';
      const classFooter = (footerTeacher || footerPreparedBy)
        ? `<div class="class-footer">${footerTeacher}${footerPreparedBy}</div>` : '';
      return `
        <div class="tab-pane ${index === 0 ? 'active' : ''}"
             id="tab-pane-${index}" role="tabpanel" aria-labelledby="tab-btn-${index}">
          <div class="class-title">
            <h2>${escHtml(displayName)}</h2>
            <p>Top 5 Outstanding Students</p>
          </div>
          ${buildGrid(students, sheetName)}
          ${classFooter}
        </div>`;
    }

    function buildUI(allClasses) {
      const tabsEl    = document.getElementById('classTabs');
      const contentEl = document.getElementById('tabContent');
      tabsEl.innerHTML    = '';
      contentEl.innerHTML = '';

      const first = allClasses[0];
      if (first) {
        if (first.schoolName)   document.getElementById('schoolName').textContent   = first.schoolName;
        if (first.academicYear) document.getElementById('academicYear').textContent = `Academic Year ${first.academicYear}`;
        if (first.period)       document.getElementById('periodBadge').textContent  = `⭐ Top 5 of ${first.period}`;
      }

      allClasses.forEach((data, i) => {
        const displayName = levelDisplay(data.levelName, data.sheetName);
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `
          <button class="nav-link ${i === 0 ? 'active' : ''}"
            id="tab-btn-${i}" data-bs-toggle="tab"
            data-bs-target="#tab-pane-${i}" type="button" role="tab"
            aria-controls="tab-pane-${i}" aria-selected="${i === 0}">
            ${escHtml(displayName)}
          </button>`;
        tabsEl.appendChild(li);
        contentEl.insertAdjacentHTML('beforeend', buildTabPane(data, i));
      });
    }

    /* ════════════════════════════════════════════════════════════════════
       TOAST
    ════════════════════════════════════════════════════════════════════ */
    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById('changeToast');
      document.getElementById('changeToastMsg').textContent = msg;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, 5000);
    }
    function hideToast() {
      document.getElementById('changeToast').classList.remove('show');
    }

    /* ════════════════════════════════════════════════════════════════════
       STATUS BAR UPDATE
    ════════════════════════════════════════════════════════════════════ */
    function setStatus(type, msg) {
      const dot    = document.getElementById('liveDot');
      const status = document.getElementById('updateStatus');
      dot.className    = 'live-dot ' + (type === 'live' ? '' : type);
      status.textContent = msg;
    }

    /* ════════════════════════════════════════════════════════════════════
       MAIN LOAD FUNCTION
    ════════════════════════════════════════════════════════════════════ */
    let isFirstLoad = true;

    async function loadAllData(isManual = false) {
      const monthIdx   = activeMonthIdx;
      const monthCfg   = MONTHS[monthIdx];
      const sheetNames = monthCfg.sheets;

      const loadingBox  = document.getElementById('loadingBox');
      const errorBox    = document.getElementById('errorBox');
      const tabContent  = document.getElementById('tabContent');

      if (isFirstLoad || isManual) {
        loadingBox.classList.remove('d-none');
        errorBox.classList.add('d-none');
        tabContent.classList.add('d-none');
      }

      try {
        const results = await Promise.all(sheetNames.map(n => fetchSheet(n, monthCfg.spreadsheetId)));
        if (activeMonthIdx !== monthIdx) return;

        buildUI(results);

        loadingBox.classList.add('d-none');
        tabContent.classList.remove('d-none');
        setStatus('live', 'Live data');
        document.getElementById('lastUpdated').textContent = fmtTime(new Date());

        isFirstLoad = false;

      } catch (err) {
        console.error(err);
        loadingBox.classList.add('d-none');
        if (isFirstLoad) {
          errorBox.classList.remove('d-none');
          document.getElementById('errorMsg').textContent = err.message;
        } else {
          setStatus('error', 'Refresh failed — retrying soon');
          tabContent.classList.remove('d-none');
        }
      }
    }

    /* ════════════════════════════════════════════════════════════════════
       INIT
    ════════════════════════════════════════════════════════════════════ */
    buildMonthNav();
    loadAllData();
    setInterval(() => {
      if (MONTHS[activeMonthIdx]?.isCurrent) loadAllData(false);
    }, REFRESH_MS);
  </script>
</body>
