<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenway School – Top 5 Outstanding Students</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── DESIGN TOKENS ─────────────────────────────────────────────────── */
    :root {
      --c-bg:          #f2f6f2;
      --c-surface:     #ffffff;
      --c-border:      #3CD500;
      --c-green-dark:  #1b5e20;
      --c-green:       #2e7d32;
      --c-green-mid:   #388e3c;
      --c-green-light: #e8f5e9;
      --c-text:        #1a2e1a;
      --c-muted:       #5a7a5a;
      --r-card:        14px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.05);
      --shadow-hover:  0 6px 12px rgba(0,0,0,.09), 0 16px 32px rgba(0,0,0,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    .site-header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 55%, #43a047 100%);
      color: #fff;
      padding: 1.75rem 1rem 1.6rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .nav-reports-btn {
      position: absolute; top: 1rem; right: 1rem; z-index: 2;
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; font-size: 0.75rem; font-weight: 600;
      padding: 0.3rem 0.8rem; border-radius: 50px; text-decoration: none;
      transition: background .18s;
    }
    .nav-reports-btn:hover { background: rgba(255,255,255,.28); color: #fff; }

    .site-header::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .header-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }
    .school-logo-img {
      width: 70px; height: 70px; border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.5);
      background: #fff;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .school-name {
      font-size: 1.5rem; font-weight: 800; letter-spacing: 0.2px;
      color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.2);
    }
    .school-sub  { font-size: 0.78rem; color: rgba(255,255,255,.78); }
    .badge-period {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.32);
      color: #fff; font-size: 0.72rem; font-weight: 600;
      padding: 0.2rem 0.9rem; border-radius: 50px;
      letter-spacing: 0.3px; margin-top: 0.1rem;
    }

    /* ── MONTH NAV ───────────────────────────────────────────────────────── */
    .month-nav {
      background: var(--c-surface); border-bottom: 2px solid var(--c-border);
      padding: 0.6rem 1rem;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      position: sticky; top: 0; z-index: 100;
    }
    .month-nav-label { font-size: 0.72rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    
    .month-dropdown .btn-dropdown {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1.2rem; border-radius: 50px;
      border: 1.5px solid var(--c-border);
      background: var(--c-surface); color: var(--c-green-dark);
      font-size: 0.8rem; font-weight: 600;
      transition: all .2s;
    }
    .month-dropdown .btn-dropdown:hover { background: var(--c-green-light); }
    .month-dropdown .dropdown-menu {
      border-radius: 12px; border: 1px solid var(--c-border);
      box-shadow: 0 4px 12px rgba(0,0,0,.1); padding: 0.4rem;
    }
    .month-dropdown .dropdown-item {
      border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      padding: 0.5rem 1rem; color: var(--c-muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .month-dropdown .dropdown-item:hover { background: var(--c-green-light); color: var(--c-green-dark); }
    .month-dropdown .dropdown-item.active { background: var(--c-green); color: #fff; }
    .month-dropdown .live-indicator {
      font-size: 0.55rem; font-weight: 800; background: #22c55e; color: #fff;
      padding: 1px 4px; border-radius: 4px; margin-left: 8px;
    }

    /* ── STICKY TABS ─────────────────────────────────────────────────────── */
    .tab-wrapper {
      background: var(--c-green);
      padding: 0 0.5rem;
      border-bottom: 2px solid var(--c-green-mid);
    }
    .nav-tabs { border-bottom: none; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tabs .nav-link {
      color: rgba(255,255,255,.58); border: none;
      border-bottom: 3px solid transparent; border-radius: 0;
      padding: 0.72rem 1.1rem; font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; transition: color .2s, border-color .2s;
    }
    .nav-tabs .nav-link:hover  { color: #fff; border-bottom-color: rgba(255,255,255,.3); }
    .nav-tabs .nav-link.active { color: #fff; background: transparent; border-bottom-color: #fff; }

    /* ── MAIN ────────────────────────────────────────────────────────────── */
    .main-content {
      max-width: 900px;
      margin: 1.75rem auto;
      padding: 0 1rem 3rem;
    }

    /* ── SECTION TITLE ───────────────────────────────────────────────────── */
    .class-title { text-align: center; margin-bottom: 1.5rem; }
    .class-title h2 { font-size: 1.15rem; font-weight: 700; color: var(--c-text); margin-bottom: 0.15rem; }
    .class-title p  { font-size: 0.77rem; color: var(--c-muted); }

    /* ── PYRAMID LAYOUT ───────────────────────────────────────────────────── */
    .pyramid-container {
      display: flex; flex-direction: column; align-items: center; gap: 2rem;
    }
    .pyramid-row-1 { display: flex; justify-content: center; width: 100%; }
    .pyramid-row-2,
    .pyramid-row-3 {
      display: flex; width: 100%; max-width: 100%; justify-content: space-between; gap: 1.5rem;
    }
    .pyramid-row-1 .student-card { width: 260px; }
    .pyramid-row-2 .student-card,
    .pyramid-row-3 .student-card { width: calc(50% - 0.75rem); max-width: 260px; }

    /* ══════════════════════════════════════════════════════════════════════
       PROFESSIONAL STUDENT CARD
    ══════════════════════════════════════════════════════════════════════ */
    .student-card {
      background: var(--c-surface);
      border-radius: var(--r-card);
      border: 1px solid var(--c-border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s ease, box-shadow .2s ease;
      position: relative;
    }
    .student-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    /* Top accent bar */
    .card-accent { height: 4px; width: 100%; flex-shrink: 0; }
    .rank-1 .card-accent { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
    .rank-2 .card-accent { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
    .rank-3 .card-accent { background: linear-gradient(90deg, #b45309, #d97706); }
    .rank-4 .card-accent,
    .rank-5 .card-accent { background: linear-gradient(90deg, #43a047, #81c784); }

    /* ── PHOTO ZONE ──────────────────────────────────────────────────────── */
    .card-photo-wrap {
      position: relative;
      width: 100%; aspect-ratio: 1 / 1;
      background: var(--c-green-light);
      overflow: hidden;
    }
    .card-photo {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
      display: block;
      transition: transform .3s ease;
    }
    .student-card:hover .card-photo { transform: scale(1.04); }

    /* Placeholder */
    .card-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.3rem;
      background: linear-gradient(160deg, #e8f5e9 0%, #c8e6c9 100%);
    }
    .card-photo-placeholder .ph-icon { font-size: 2.4rem; color: #81c784; opacity: .7; }

    /* ── CARD BODY ───────────────────────────────────────────────────────── */
    .card-body-content {
      padding: 0.8rem 0.8rem 1rem;
      display: flex; flex-direction: column; gap: 0.65rem;
      text-align: center; flex-grow: 1;
    }
    .card-rank-badge {
      position: absolute; top: 0.6rem; left: 0.6rem;
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; color: #fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.15);
      z-index: 5;
    }
    .rank-1 .card-rank-badge { background: #f59e0b; }
    .rank-2 .card-rank-badge { background: #94a3b8; }
    .rank-3 .card-rank-badge { background: #cd7c3a; }
    .rank-4 .card-rank-badge,
    .rank-5 .card-rank-badge { background: var(--c-green-mid); }

    .card-name {
      font-size: 0.9rem; font-weight: 800; color: var(--c-text);
      line-height: 1.2; margin: 0; min-height: 2.4rem;
      display: flex; align-items: center; justify-content: center;
    }
    .card-score-row {
      display: flex; justify-content: center; align-items: baseline; gap: 0.2rem;
      margin-top: -0.2rem;
    }
    .card-score-val { font-size: 1.4rem; font-weight: 900; color: var(--c-green); letter-spacing: -0.5px; }
    .card-score-lbl { font-size: 0.58rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    
    .card-badges { display: flex; justify-content: center; gap: 0.28rem; flex-wrap: wrap; }
    .badge-pill {
      font-size: 0.59rem; font-weight: 700;
      padding: 0.15em 0.55em; border-radius: 50px; letter-spacing: 0.2px;
    }
    .badge-pass { background: #dcfce7; color: #15803d; }
    .badge-fail { background: #fee2e2; color: #b91c1c; }
    .grade-a    { background: #dcfce7; color: #14532d; }
    .grade-b    { background: #d1fae5; color: #065f46; }
    .grade-c    { background: #ecfccb; color: #365314; }
    .grade-d    { background: #fef9c3; color: #713f12; }
    .grade-f    { background: #fee2e2; color: #991b1b; }

    /* ── TEACHER FOOTER ──────────────────────────────────────────────────── */
    .class-footer {
      margin-top: 1.25rem;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.65rem 1rem;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      font-size: 0.74rem; color: var(--c-muted);
    }
    .class-footer span { display: flex; align-items: center; gap: 0.3rem; }

    /* ── UPDATE STATUS ───────────────────────────────────────────────────── */
    .update-bar {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: 12px; padding: 0.7rem 1rem; margin-top: 1.75rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.74rem; color: var(--c-muted);
    }
    .live-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-right: 0.4rem;
    }
    .live-dot.stale { background: #94a3b8; }

    /* ── SITE FOOTER ─────────────────────────────────────────────────────── */
    .site-footer {
      text-align: center; padding: 2rem 1rem;
      font-size: 0.75rem; color: var(--c-muted);
      border-top: 1px solid var(--c-border); margin-top: 2rem;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
    @media (max-width: 650px) {
      .pyramid-row-2, .pyramid-row-3 { flex-direction: column; align-items: center; gap: 1.5rem; }
      .pyramid-row-2 .student-card, .pyramid-row-3 .student-card { width: 260px; }
      .class-footer { flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="reports.html" class="nav-reports-btn"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a>
    <div class="header-inner">
      <img src="logo.png" alt="School Logo" class="school-logo-img" onerror="this.style.display='none'" />
      <div class="school-name" id="schoolName">Greenway School</div>
      <div class="school-sub"  id="academicYear">Academic Year 2025–2026</div>
      <div class="badge-period" id="periodBadge">⭐ Top 5</div>
    </div>
  </header>

  <!-- MONTH NAVIGATION -->
  <nav class="month-nav">
    <span class="month-nav-label"><i class="bi bi-calendar3 me-1"></i>Select Period:</span>
    <div class="dropdown month-dropdown" id="monthDropdownWrap">
      <button class="btn-dropdown dropdown-toggle" type="button" id="monthDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-calendar-event me-1"></i> Loading...
      </button>
      <ul class="dropdown-menu" id="monthDropdownMenu" aria-labelledby="monthDropdownBtn">
        <!-- JS injected -->
      </ul>
    </div>
  </nav>

  <!-- TABS -->
  <div class="tab-wrapper">
    <ul class="nav nav-tabs" id="classTabs" role="tablist"></ul>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <div id="loadingBox" class="loading-box text-center py-5">
      <div class="spinner-border text-success mb-3" role="status"></div>
      <p class="text-muted small fw-bold">Fetching Google Sheets data...</p>
    </div>

    <div id="errorBox" class="error-box d-none text-center py-5">
      <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
      <h5 class="mt-2">Failed to load data</h5>
      <p id="errorMsg" class="text-muted small"></p>
      <button class="btn btn-sm btn-outline-danger mt-2" onclick="location.reload()">Try Again</button>
    </div>

    <div id="tabContent" class="tab-content d-none">
      <!-- JS injected -->
    </div>

    <div id="updateBar" class="update-bar d-none">
      <div>
        <span id="liveDot" class="live-dot"></span>
        <span id="statusText">Live data</span>
        <span class="mx-1">·</span>
        <span>Updated: <strong id="lastUpdated">--:--</strong></span>
      </div>
      <button class="btn btn-sm btn-link text-success p-0 text-decoration-none fw-bold" onclick="manualRefresh()">
        <i class="bi bi-arrow-clockwise"></i> Refresh Now
      </button>
    </div>
  </div>

  <footer class="site-footer" id="siteFooter">
    © 2026 Greenway School &nbsp;·&nbsp; Developed by <strong>Phoun Borin</strong>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ── CONFIG ─────────────────────────────────────────────────────────── */
    const MONTHS = [
      {
        label:          'January 2026',
        spreadsheetId:  '1jeOXFdhK9vZiq6xng-z8m6yUpk9HA354BttDnFvAwFY',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
      {
        label:          'February 2026',
        spreadsheetId:  '1VdWhQX5JXZFf4bmvIfLkKUJK8Ul68exAmDATMO_1S8g',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
      {
        label:          'March 2026',
        spreadsheetId:  '1SK7kWxD_mYWKqMJN_P2L5-8RGRwUylzX9SUXOiRevwM',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      true
      }
    ];

    let activeMonthIdx = MONTHS.findIndex(m => m.isCurrent);
    if (activeMonthIdx === -1) activeMonthIdx = MONTHS.length - 1;
    let isFirstLoad = true;

    /* ── HELPERS ────────────────────────────────────────────────────────── */
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtTime(d) { return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    function gradeClass(g) { return `grade-${(g||'F').toLowerCase()}`; }
    
    function driveUrlToDirectImg(url) {
      if (!url) return null;
      url = url.trim();
      if (!url.startsWith('http')) return null;
      let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
      m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
      return url;
    }

    // ─── DATA FETCHING ───────────────────────────────────────────────────────
    async function fetchSheet(sheetName, spreadsheetId) {
      const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      const resp = await fetch(url);
      const text = await resp.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      const rows = json.table.rows;

      // Find all students (looking for rows that start with a number like '01', '02')
      const students = rows.map(r => {
        const idVal = String(r.c[0]?.v || '').trim();
        if (!/^\d+$/.test(idVal)) return null;

        const avg = r.c[3]?.v || 0;
        return {
          rank:   parseInt(idVal),
          name:   r.c[1]?.v || '',
          gender: r.c[2]?.v || '',
          avg:    typeof avg === 'number' ? avg : parseFloat(avg),
          grade:  r.c[4]?.v || '',
          result: r.c[6]?.v || '',
          photo:  driveUrlToDirectImg(r.c[7]?.v)
        };
      }).filter(s => s && s.name && !s.name.includes('Date:') && !s.name.includes('Teacher'));

      // Metadata from bottom (signatures) or top if needed
      // For March 2026, it's at the bottom
      const footerRows = rows.filter(r => !r.c[0]?.v && r.c[1]?.v);
      const teacherRow = footerRows.find(r => String(r.c[1]?.v).includes('Teacher'));
      const preparedRow = footerRows.find(r => String(r.c[4]?.v).includes('Prepared') || String(r.c[6]?.v).includes('Prepared'));
      
      const teacher = teacherRow ? String(teacherRow.c[1]?.v).split(':')[1]?.trim() : '';
      const preparedBy = preparedRow ? (preparedRow.c[6]?.v || preparedRow.c[5]?.v || preparedRow.c[4]?.v) : '';

      return { 
        sheetName, 
        schoolName: 'Greenway School', 
        period: MONTHS[activeMonthIdx].label.split(' ')[0], 
        academicYear: '2025–2026', 
        levelName: sheetName, 
        teacher, 
        preparedBy, 
        students: students.slice(0, 5) 
      };
    }

    // ─── UI BUILDERS ─────────────────────────────────────────────────────────
    function buildMonthNav() {
      const btn = document.getElementById('monthDropdownBtn');
      const menu = document.getElementById('monthDropdownMenu');
      const current = MONTHS[activeMonthIdx];
      
      btn.innerHTML = `<i class="bi bi-calendar-event me-1"></i> ${escHtml(current.label)} ${current.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}`;
      
      menu.innerHTML = MONTHS.map((m, idx) => `
        <li>
          <a class="dropdown-item ${idx === activeMonthIdx ? 'active' : ''}" href="#" onclick="switchMonth(${idx}); return false;">
            <span>${escHtml(m.label)}</span>
            ${m.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}
          </a>
        </li>
      `).join('');
    }

    function switchMonth(idx) {
      if (idx === activeMonthIdx && !isFirstLoad) return;
      activeMonthIdx = idx;
      isFirstLoad = true;
      buildMonthNav();
      loadAllData();
    }

    function buildStudentCard(s) {
      const isPass = /pass/i.test(s.result);
      const photoHtml = s.photo 
        ? `<img src="${s.photo}" class="card-photo" alt="${escHtml(s.name)}">`
        : `<div class="card-photo-placeholder">
             <div class="ph-icon">${s.gender.toLowerCase() === 'female' ? '👩' : '👨'}</div>
           </div>`;

      return `
        <div class="student-card rank-${s.rank}">
          <div class="card-accent"></div>
          <div class="card-rank-badge">${s.rank}</div>
          <div class="card-photo-wrap">${photoHtml}</div>
          <div class="card-body-content">
            <h3 class="card-name">${escHtml(s.name)}</h3>
            <div class="card-score-row">
              <span class="card-score-val">${s.avg.toFixed(2)}</span>
              <span class="card-score-lbl">Avg</span>
            </div>
            <div class="card-badges">
              <span class="badge-pill ${gradeClass(s.grade)}">${s.grade || 'N/A'}</span>
              <span class="badge-pill ${isPass ? 'badge-pass' : 'badge-fail'}">${isPass ? 'PASS' : 'FAIL'}</span>
            </div>
          </div>
        </div>`;
    }

    function buildTabPane(data, idx) {
      const top1 = data.students.find(s => s.rank === 1);
      const top2 = data.students.find(s => s.rank === 2);
      const top3 = data.students.find(s => s.rank === 3);
      const top4 = data.students.find(s => s.rank === 4);
      const top5 = data.students.find(s => s.rank === 5);

      const footerTeacher = data.teacher ? `<span><i class="bi bi-person-badge me-1"></i>Teacher: <strong>${escHtml(data.teacher)}</strong></span>` : '';
      const footerPrepared = data.preparedBy ? `<span><i class="bi bi-pencil-square me-1"></i>Prepared by: <strong>${escHtml(data.preparedBy)}</strong></span>` : '';

      return `
        <div class="tab-pane fade ${idx === 0 ? 'show active' : ''}" id="pane-${idx}" role="tabpanel">
          <div class="class-title">
            <h2>${escHtml(data.levelName || data.sheetName)}</h2>
            <p>Top 5 Outstanding Students</p>
          </div>
          
          <div class="pyramid-container">
            <div class="pyramid-row-1">${top1 ? buildStudentCard(top1) : ''}</div>
            <div class="pyramid-row-2">
              ${top2 ? buildStudentCard(top2) : ''}
              ${top3 ? buildStudentCard(top3) : ''}
            </div>
            <div class="pyramid-row-3">
              ${top4 ? buildStudentCard(top4) : ''}
              ${top5 ? buildStudentCard(top5) : ''}
            </div>
          </div>

          <div class="class-footer">${footerTeacher}${footerPrepared}</div>
        </div>`;
    }

    async function loadAllData() {
      const cfg = MONTHS[activeMonthIdx];
      const loading = document.getElementById('loadingBox');
      const error   = document.getElementById('errorBox');
      const content = document.getElementById('tabContent');
      const update  = document.getElementById('updateBar');
      
      if (isFirstLoad) {
        loading.classList.remove('d-none');
        error.classList.add('d-none');
        content.classList.add('d-none');
        update.classList.add('d-none');
      }

      try {
        const results = await Promise.all(cfg.sheets.map(s => fetchSheet(s, cfg.spreadsheetId)));
        
        const tabsEl = document.getElementById('classTabs');
        tabsEl.innerHTML = results.map((d, i) => `
          <li class="nav-item">
            <button class="nav-link ${i === 0 ? 'active' : ''}" data-bs-toggle="tab" data-bs-target="#pane-${i}" type="button">
              ${escHtml(d.levelName || d.sheetName)}
            </button>
          </li>
        `).join('');

        content.innerHTML = results.map((d, i) => buildTabPane(d, i)).join('');
        
        if (results[0]) {
          document.getElementById('schoolName').textContent = results[0].schoolName;
          document.getElementById('academicYear').textContent = `Academic Year ${results[0].academicYear}`;
          document.getElementById('periodBadge').textContent = `⭐ Top 5 of ${results[0].period}`;
          document.getElementById('lastUpdated').textContent = fmtTime(new Date());
        }

        loading.classList.add('d-none');
        content.classList.remove('d-none');
        update.classList.remove('d-none');
        document.getElementById('statusText').textContent = cfg.isCurrent ? 'Live data' : 'Historical data';
        document.getElementById('liveDot').className = 'live-dot ' + (cfg.isCurrent ? '' : 'stale');
        
        isFirstLoad = false;
      } catch (err) {
        console.error(err);
        loading.classList.add('d-none');
        error.classList.remove('d-none');
        document.getElementById('errorMsg').textContent = err.message;
      }
    }

    function manualRefresh() {
      isFirstLoad = true;
      loadAllData();
    }

    // Init
    buildMonthNav();
    loadAllData();
  </script>
</body>
</html>
