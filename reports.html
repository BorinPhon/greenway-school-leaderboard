<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenway School – Monthly Reports</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ─────────────────────────────────────────────────────────── */
    :root {
      --c-bg:          #f2f6f2;
      --c-surface:     #ffffff;
      --c-border:      #3CD500;
      --c-green-dark:  #1b5e20;
      --c-green:       #2e7d32;
      --c-green-mid:   #388e3c;
      --c-green-light: #e8f5e9;
      --c-text:        #1a2e1a;
      --c-muted:       #5a7a5a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--c-bg); color: var(--c-text); min-height: 100vh; }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    .site-header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 55%, #43a047 100%);
      color: #fff; padding: 1.5rem 1rem 1.4rem; text-align: center; position: relative; overflow: hidden;
    }
    .site-header::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .header-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
    .school-logo-img { width: 62px; height: 62px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,.5); background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.2); }
    .school-name { font-size: 1.4rem; font-weight: 800; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.2); }
    .school-sub  { font-size: 0.76rem; color: rgba(255,255,255,.78); }
    .page-badge  {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.32);
      color: #fff; font-size: 0.72rem; font-weight: 600;
      padding: 0.2rem 0.9rem; border-radius: 50px; margin-top: 0.2rem;
    }
    .nav-back {
      position: absolute; top: 1rem; left: 1rem; z-index: 2;
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; font-size: 0.75rem; font-weight: 600;
      padding: 0.3rem 0.8rem; border-radius: 50px; text-decoration: none;
      transition: background .18s;
    }
    .nav-back:hover { background: rgba(255,255,255,.28); color: #fff; }

    /* ── MONTH NAV ───────────────────────────────────────────────────────── */
    .month-nav {
      background: var(--c-surface); border-bottom: 2px solid var(--c-border);
      padding: 0.6rem 1rem;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      position: sticky; top: 0; z-index: 100;
    }
    .month-nav-label { font-size: 0.72rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    
    .month-dropdown .btn-dropdown {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1.2rem; border-radius: 50px;
      border: 1.5px solid var(--c-border);
      background: var(--c-surface); color: var(--c-green-dark);
      font-size: 0.8rem; font-weight: 600;
      transition: all .2s;
    }
    .month-dropdown .btn-dropdown:hover { background: var(--c-green-light); }
    .month-dropdown .dropdown-menu {
      border-radius: 12px; border: 1px solid var(--c-border);
      box-shadow: 0 4px 12px rgba(0,0,0,.1); padding: 0.4rem;
    }
    .month-dropdown .dropdown-item {
      border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      padding: 0.5rem 1rem; color: var(--c-muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .month-dropdown .dropdown-item:hover { background: var(--c-green-light); color: var(--c-green-dark); }
    .month-dropdown .dropdown-item.active { background: var(--c-green); color: #fff; }
    .month-dropdown .live-indicator {
      font-size: 0.55rem; font-weight: 800; background: #22c55e; color: #fff;
      padding: 1px 4px; border-radius: 4px; margin-left: 8px;
    }

    /* ── CLASS TABS ──────────────────────────────────────────────────────── */
    .tab-wrapper {
      background: var(--c-green); padding: 0 0.5rem;
      border-bottom: 2px solid var(--c-green-mid);
    }
    .nav-tabs { border-bottom: none; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tabs .nav-link {
      color: rgba(255,255,255,.58); border: none;
      border-bottom: 3px solid transparent; border-radius: 0;
      padding: 0.7rem 1.1rem; font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; transition: color .2s, border-color .2s;
    }
    .nav-tabs .nav-link:hover  { color: #fff; border-bottom-color: rgba(255,255,255,.3); }
    .nav-tabs .nav-link.active { color: #fff; background: transparent; border-bottom-color: #fff; }

    /* ── MAIN ────────────────────────────────────────────────────────────── */
    .main-content { max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem 3rem; }

    /* ── SEARCH BAR ──────────────────────────────────────────────────────── */
    .search-bar-wrap {
      margin-bottom: 1rem;
      display: flex; gap: 0.75rem; align-items: center;
    }
    .search-input-group {
      flex: 1; position: relative;
    }
    .search-input-group i {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--c-muted); font-size: 0.9rem;
    }
    .search-input {
      width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem;
      border-radius: 10px; border: 1px solid #e0ede0;
      background: var(--c-surface); font-size: 0.85rem;
      transition: border-color .2s;
    }
    .search-input:focus { outline: none; border-color: var(--c-green); }

    .btn-print {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--c-surface); border: 1px solid var(--c-border);
      color: var(--c-green-dark); font-size: 0.8rem; font-weight: 600;
      padding: 0.55rem 1rem; border-radius: 10px; cursor: pointer;
      transition: all .2s;
    }
    .btn-print:hover { background: var(--c-green-light); }

    /* ── LOADING / ERROR ─────────────────────────────────────────────────── */
    .loading-box {
      text-align: center; padding: 3rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .error-box {
      text-align: center; padding: 2.5rem 1rem;
      background: #fff3f3; border: 1px solid #fca5a5;
      border-radius: 12px; margin-top: 1.5rem;
    }

    /* ── REPORT SECTION HEADER ───────────────────────────────────────────── */
    .report-header {
      background: var(--c-surface); border-radius: 12px;
      border: 1px solid var(--c-border);
      padding: 1rem 1.25rem; margin-bottom: 1.25rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem;
    }
    .report-header-left h2 { font-size: 1.05rem; font-weight: 700; color: var(--c-text); margin-bottom: 0.1rem; }
    .report-header-left p  { font-size: 0.75rem; color: var(--c-muted); margin: 0; }
    .report-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      background: var(--c-green-light); color: var(--c-green-dark);
      border-radius: 50px; padding: 0.2rem 0.7rem;
      font-size: 0.7rem; font-weight: 600;
    }

    /* ── SUMMARY CARDS ───────────────────────────────────────────────────── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .summary-card {
      background: var(--c-surface); border-radius: 10px;
      border: 1px solid #e0ede0; padding: 0.85rem 1rem;
      text-align: center;
    }
    .summary-card .s-value { font-size: 1.5rem; font-weight: 800; color: var(--c-green); line-height: 1; }
    .summary-card .s-label { font-size: 0.68rem; color: var(--c-muted); margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── STUDENT TABLE ───────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--c-surface); border-radius: 12px;
      border: 1px solid #e0ede0; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .report-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .report-table thead th {
      background: var(--c-green); color: #fff;
      padding: 0.65rem 0.85rem; font-weight: 600; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
      position: sticky; top: 0; z-index: 10;
    }
    .report-table thead th:first-child { border-radius: 0; }
    .report-table tbody tr { border-bottom: 1px solid #f0f4f0; transition: background .15s; }
    .report-table tbody tr:nth-child(even) { background: #fafdfa; }
    .report-table tbody tr:last-child { border-bottom: none; }
    .report-table tbody tr:hover { background: var(--c-green-light) !important; }
    .report-table tbody td { padding: 0.6rem 0.85rem; vertical-align: middle; }
    .report-table tbody tr.top5-row { background: #f0fdf4; }
    .report-table tbody tr.top5-row:hover { background: #dcfce7 !important; }

    /* rank badge */
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      font-size: 0.7rem; font-weight: 700; color: #fff;
    }
    .rank-1 { background: #f59e0b; }
    .rank-2 { background: #94a3b8; }
    .rank-3 { background: #cd7c3a; }
    .rank-other { background: var(--c-green-mid); }

    /* grade badge */
    .grade-pill {
      display: inline-block; padding: 0.15rem 0.55rem; border-radius: 50px;
      font-size: 0.68rem; font-weight: 700;
    }
    .grade-A { background: #dcfce7; color: #166534; }
    .grade-B { background: #dbeafe; color: #1e40af; }
    .grade-C { background: #fef9c3; color: #854d0e; }
    .grade-D { background: #fff7ed; color: #9a3412; }
    .grade-E { background: #fff1f2; color: #9f1239; }
    .grade-F { background: #fef2f2; color: #b91c1c; }

    .result-pass { color: #16a34a; font-weight: 700; }
    .result-fail { color: #dc2626; font-weight: 700; }
    .top5-star { color: #f59e0b; font-size: 0.75rem; }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    .class-footer {
      padding: 1rem 1.25rem; background: #fafdfa; border-top: 1px solid #f0f4f0;
      display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--c-muted);
    }
    .site-footer {
      text-align: center; padding: 2rem 1rem; font-size: 0.75rem; color: var(--c-muted);
      border-top: 1px solid #e0ede0; margin-top: 2rem;
    }

    /* ── STATUS BAR ──────────────────────────────────────────────────────── */
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 1rem;
      margin-bottom: 1rem; font-size: 0.7rem; color: var(--c-muted);
    }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; }
    .live-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
    .live-dot.stale { background: #94a3b8; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .btn-refresh {
      background: none; border: none; color: var(--c-green); cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.3rem; font-weight: 600;
    }
    .btn-refresh:hover { text-decoration: underline; }
    .btn-refresh.spinning i { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .report-header { flex-direction: column; align-items: flex-start; }
      .class-footer { flex-direction: column; gap: 0.5rem; }
    }
    @media print {
      .site-header, .month-nav, .tab-wrapper, .search-bar-wrap, .status-bar, .site-footer, .nav-back { display: none !important; }
      body { background: #fff; }
      .main-content { max-width: 100%; margin: 0; padding: 0; }
      .report-table thead th { background: #eee !important; color: #000 !important; position: static; }
      .table-wrap { border: 1px solid #000; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="nav-back"><i class="bi bi-arrow-left"></i> Leaderboard</a>
    <div class="header-inner">
      <img src="logo.png" alt="School Logo" class="school-logo-img" onerror="this.style.display='none'" />
      <div class="school-name" id="schoolName">Greenway School</div>
      <div class="school-sub" id="academicYear">Academic Year 2025–2026</div>
      <div class="page-badge"><i class="bi bi-file-earmark-bar-graph me-1"></i>Monthly Performance Reports</div>
    </div>
  </header>

  <!-- MONTH NAVIGATION -->
  <nav class="month-nav">
    <span class="month-nav-label"><i class="bi bi-calendar3 me-1"></i>Select Period:</span>
    <div class="dropdown month-dropdown" id="monthDropdownWrap">
      <button class="btn-dropdown dropdown-toggle" type="button" id="monthDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-calendar-event me-1"></i> Loading...
      </button>
      <ul class="dropdown-menu" id="monthDropdownMenu" aria-labelledby="monthDropdownBtn">
        <!-- JS injected -->
      </ul>
    </div>
  </nav>

  <!-- TABS -->
  <div class="tab-wrapper">
    <ul class="nav nav-tabs" id="classTabs" role="tablist"></ul>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <div id="actionBar" class="search-bar-wrap d-none">
      <div class="search-input-group">
        <i class="bi bi-search"></i>
        <input type="text" id="studentSearch" class="search-input" placeholder="Search student name..." onkeyup="filterTable()">
      </div>
      <button class="btn-print" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
    </div>

    <div id="statusBar" class="status-bar d-none">
      <span id="liveDot" class="live-dot stale"></span>
      <span id="statusText">Checking...</span>
      <span class="mx-1">·</span>
      <span>Updated: <strong id="lastUpdated">--:--</strong></span>
      <span class="mx-1">·</span>
      <button id="refreshBtn" class="btn-refresh" onclick="manualRefresh()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>

    <div id="loadingBox" class="loading-box">
      <div class="spinner-border text-success mb-3" role="status"></div>
      <p class="text-muted small fw-bold">Fetching Google Sheets data...</p>
    </div>

    <div id="errorBox" class="error-box d-none">
      <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
      <h5 class="mt-2">Failed to load data</h5>
      <p id="errorMsg" class="text-muted small"></p>
      <button class="btn btn-sm btn-outline-danger mt-2" onclick="location.reload()">Try Again</button>
    </div>

    <div class="tab-content" id="tabContent"></div>
  </div>

  <footer class="site-footer" id="siteFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────
    const MONTHS = [
      {
        label:          'January 2026',
        spreadsheetId:  '1jeOXFdhK9vZiq6xng-z8m6yUpk9HA354BttDnFvAwFY',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
      {
        label:          'February 2026',
        spreadsheetId:  '1VdWhQX5JXZFf4bmvIfLkKUJK8Ul68exAmDATMO_1S8g',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      false
      },
      {
        label:          'March 2026',
        spreadsheetId:  '1SK7kWxD_mYWKqMJN_P2L5-8RGRwUylzX9SUXOiRevwM',
        sheets:         ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'],
        isCurrent:      true
      }
    ];

    const CURRENT_MONTH_IDX = MONTHS.findIndex(m => m.isCurrent);
    let activeMonthIdx = CURRENT_MONTH_IDX >= 0 ? CURRENT_MONTH_IDX : MONTHS.length - 1;
    let isFirstLoad    = true;

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtTime(d) { return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    function rankClass(r) { if(r===1) return 'rank-1'; if(r===2) return 'rank-2'; if(r===3) return 'rank-3'; return 'rank-other'; }
    function gradeClass(g) { return `grade-${(g||'F').toUpperCase()}`; }
    
    function cacheKeyForMonth(monthIdx) { return `gws_report_cache_month_${monthIdx}_v3`; }
    function loadCache(monthIdx) {
      try {
        const raw = JSON.parse(localStorage.getItem(cacheKeyForMonth(monthIdx)) || '{}');
        if (MONTHS[monthIdx] && MONTHS[monthIdx].isCurrent) {
          const d = new Date();
          const calKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          if (raw.calKey && raw.calKey !== calKey) return null;
        }
        // Cache expiry: 15 minutes
        if (raw.savedAt && (Date.now() - new Date(raw.savedAt).getTime() > 15 * 60 * 1000)) return null;
        return raw.data || null;
      } catch { return null; }
    }
    function saveCache(monthIdx, data) {
      try {
        const d = new Date();
        const calKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        localStorage.setItem(cacheKeyForMonth(monthIdx), JSON.stringify({ calKey, savedAt: new Date().toISOString(), data }));
      } catch (e) {}
    }

    // ─── DATA FETCHING ───────────────────────────────────────────────────────
    async function fetchSheet(sheetName, spreadsheetId) {
      const bust = Math.floor(Date.now() / 60000);
      const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&_=${bust}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
      if (!match) throw new Error("Invalid response");
      const json = JSON.parse(match[1]);
      if (json.status !== 'ok') throw new Error(json.errors?.[0]?.message || "Sheet error");

      const rows = json.table.rows;
      // Standard metadata extraction matching index.html logic
      const schoolName   = (rows[0]?.c?.[1]?.v || 'Greenway School').toString();
      const period       = (rows[1]?.c?.[1]?.v || '').toString();
      const academicYear = (rows[2]?.c?.[1]?.v || '').toString();
      const levelName    = (rows[3]?.c?.[1]?.v || sheetName).toString();

      const students = [];
      // Data starts from row 6 (index 5)
      for (let i = 5; i < rows.length; i++) {
        const c = rows[i].c;
        if (!c || !c[1]?.v) continue;
        const name = c[1].v.toString().trim();
        if (/date|seen|teacher|prepared/i.test(name)) continue;

        students.push({
          num:    (c[0]?.v || '').toString().trim(),
          name:   name,
          gender: (c[2]?.v || '').toString().trim(),
          avg:    parseFloat(c[3]?.v) || 0,
          grade:  (c[4]?.v || 'F').toString().trim(),
          rank:   parseInt(c[5]?.v) || (students.length + 1),
          result: (c[6]?.v || 'Fail').toString().trim()
        });
      }

      let teacher = '', preparedBy = '';
      const lastRows = rows.slice(-5);
      for (const r of lastRows) {
        const txt = (r.c?.[1]?.v || '').toString();
        const mt = txt.match(/Teacher:\s*(.+)/i); if (mt) teacher = mt[1].trim();
        const mp = txt.match(/Prepared by:\s*(.+)/i); if (mp) preparedBy = mp[1].trim();
      }

      return { sheetName, schoolName, period, academicYear, levelName, teacher, preparedBy, students };
    }

    // ─── UI BUILDERS ─────────────────────────────────────────────────────────
    function buildMonthNav() {
      const btn = document.getElementById('monthDropdownBtn');
      const menu = document.getElementById('monthDropdownMenu');
      const current = MONTHS[activeMonthIdx];
      
      btn.innerHTML = `<i class="bi bi-calendar-event me-1"></i> ${escHtml(current.label)} ${current.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}`;
      
      menu.innerHTML = MONTHS.map((m, idx) => `
        <li>
          <a class="dropdown-item ${idx === activeMonthIdx ? 'active' : ''}" href="#" onclick="switchMonth(${idx}); return false;">
            <span>${escHtml(m.label)}</span>
            ${m.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}
          </a>
        </li>
      `).join('');
    }

    function switchMonth(idx) {
      if (idx === activeMonthIdx && !isFirstLoad) return;
      activeMonthIdx = idx;
      isFirstLoad = false;
      buildMonthNav();
      loadAllData();
    }

    function buildSummary(students) {
      const total = students.length;
      const passed = students.filter(s => /pass/i.test(s.result)).length;
      const failed = total - passed;
      const validAvgs = students.filter(s => s.avg > 0).map(s => s.avg);
      const classAvg = validAvgs.length ? (validAvgs.reduce((a,b)=>a+b,0)/validAvgs.length).toFixed(2) : '0.00';

      return `
        <div class="summary-grid">
          <div class="summary-card"><div class="s-value">${total}</div><div class="s-label">Students</div></div>
          <div class="summary-card"><div class="s-value text-success">${passed}</div><div class="s-label">Passed</div></div>
          <div class="summary-card"><div class="s-value text-danger">${failed}</div><div class="s-label">Failed</div></div>
          <div class="summary-card"><div class="s-value text-primary">${classAvg}</div><div class="s-label">Avg Score</div></div>
        </div>`;
    }

    function buildTable(students) {
      if (!students.length) return '<div class="empty-state"><i class="bi bi-inbox"></i>No data available</div>';

      const sorted = students.slice().sort((a,b) => a.rank - b.rank || b.avg - a.avg);
      const rows = sorted.map(s => {
        const isTop5 = s.rank <= 5;
        const gIcon = /female|f/i.test(s.gender) ? '<i class="bi bi-gender-female gender-f"></i>' : '<i class="bi bi-gender-male gender-m"></i>';
        return `
          <tr class="${isTop5 ? 'top5-row' : ''}" data-name="${escHtml(s.name).toLowerCase()}">
            <td class="text-center"><span class="rank-badge ${rankClass(s.rank)}">${s.rank}</span></td>
            <td class="text-center text-muted small">${escHtml(s.num)}</td>
            <td><strong>${escHtml(s.name)}</strong>${isTop5 ? ' <i class="bi bi-star-fill top5-star"></i>' : ''}</td>
            <td class="text-center">${gIcon}</td>
            <td class="text-center fw-bold">${s.avg.toFixed(2)}</td>
            <td class="text-center"><span class="grade-pill ${gradeClass(s.grade)}">${escHtml(s.grade)}</span></td>
            <td>${/pass/i.test(s.result) ? '<span class="result-pass">Pass</span>' : '<span class="result-fail">Fail</span>'}</td>
          </tr>`;
      }).join('');

      return `
        <div class="table-wrap">
          <table class="report-table">
            <thead>
              <tr>
                <th class="text-center" style="width:60px">Rank</th>
                <th class="text-center" style="width:50px">No.</th>
                <th>Student Name</th>
                <th class="text-center" style="width:70px">Gender</th>
                <th class="text-center" style="width:80px">Average</th>
                <th class="text-center" style="width:70px">Grade</th>
                <th style="width:90px">Result</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function buildUI(allClasses) {
      const tabs = document.getElementById('classTabs');
      const content = document.getElementById('tabContent');

      const first = allClasses[0];
      if (first) {
        document.getElementById('schoolName').textContent = first.schoolName;
        document.getElementById('academicYear').textContent = `Academic Year ${first.academicYear}`;
        document.getElementById('siteFooter').innerHTML = `© ${new Date().getFullYear()} ${escHtml(first.schoolName)} &nbsp;·&nbsp; Developed by <strong>Phoun Borin</strong>`;
      }

      tabs.innerHTML = allClasses.map((c, i) => `
        <li class="nav-item">
          <button class="nav-link ${i===0?'active':''}" data-bs-toggle="tab" data-bs-target="#pane-${i}" type="button">${escHtml(c.levelName || c.sheetName)}</button>
        </li>`).join('');

      content.innerHTML = allClasses.map((c, i) => `
        <div class="tab-pane fade ${i===0?'show active':''}" id="pane-${i}" role="tabpanel">
          <div class="report-header">
            <div class="report-header-left">
              <h2>${escHtml(c.levelName || c.sheetName)}</h2>
              <p>${escHtml(c.schoolName)} · ${MONTHS[activeMonthIdx].label}</p>
            </div>
            <div class="report-meta">
              <span class="meta-pill"><i class="bi bi-people"></i> ${c.students.length} Students</span>
              <span class="meta-pill"><i class="bi bi-calendar"></i> ${escHtml(c.period || 'Monthly')}</span>
            </div>
          </div>
          ${buildSummary(c.students)}
          ${buildTable(c.students)}
          <div class="class-footer">
            ${c.teacher ? `<span>Teacher: <strong>${escHtml(c.teacher)}</strong></span>` : ''}
            ${c.preparedBy ? `<span>Prepared by: <strong>${escHtml(c.preparedBy)}</strong></span>` : ''}
          </div>
        </div>`).join('');
    }

    function filterTable() {
      const q = document.getElementById('studentSearch').value.toLowerCase();
      const rows = document.querySelectorAll('.report-table tbody tr');
      rows.forEach(row => {
        const name = row.getAttribute('data-name');
        row.style.display = name.includes(q) ? '' : 'none';
      });
    }

    async function loadAllData(isManual = false) {
      const cfg = MONTHS[activeMonthIdx];
      const loadingBox = document.getElementById('loadingBox');
      const errorBox = document.getElementById('errorBox');
      const tabContent = document.getElementById('tabContent');
      const statusBar = document.getElementById('statusBar');
      const actionBar = document.getElementById('actionBar');
      const refreshBtn = document.getElementById('refreshBtn');

      if (isFirstLoad || isManual) {
        loadingBox.classList.remove('d-none');
        errorBox.classList.add('d-none');
        tabContent.classList.add('d-none');
        statusBar.classList.add('d-none');
        actionBar.classList.add('d-none');
      }
      if (isManual) refreshBtn.classList.add('spinning');

      try {
        const cached = !isManual ? loadCache(activeMonthIdx) : null;
        let data;
        if (cached) {
          data = cached;
          setStatus('stale', 'Loaded from cache');
        } else {
          data = await Promise.all(cfg.sheets.map(s => fetchSheet(s, cfg.spreadsheetId)));
          saveCache(activeMonthIdx, data);
          setStatus('live', 'Live data');
        }

        buildUI(data);
        loadingBox.classList.add('d-none');
        tabContent.classList.remove('d-none');
        statusBar.classList.remove('d-none');
        actionBar.classList.remove('d-none');
        document.getElementById('lastUpdated').textContent = fmtTime(new Date());
        isFirstLoad = false;
      } catch (err) {
        console.error(err);
        loadingBox.classList.add('d-none');
        errorBox.classList.remove('d-none');
        document.getElementById('errorMsg').textContent = err.message;
      } finally {
        refreshBtn.classList.remove('spinning');
      }
    }

    function setStatus(type, msg) {
      const dot = document.getElementById('liveDot');
      const txt = document.getElementById('statusText');
      dot.className = `live-dot ${type}`;
      txt.textContent = msg;
    }

    function manualRefresh() { loadAllData(true); }

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      buildMonthNav();
      loadAllData();
    });
  </script>
</body>
</html>
