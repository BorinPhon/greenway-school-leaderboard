<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Performance Reports – Greenway School</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --c-bg:          #f2f6f2;
      --c-surface:     #ffffff;
      --c-border:      #3CD500;
      --c-green-dark:  #1b5e20;
      --c-green:       #2e7d32;
      --c-green-mid:   #388e3c;
      --c-green-light: #e8f5e9;
      --c-text:        #1a2e1a;
      --c-muted:       #5a7a5a;
      --r-card:        14px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.05);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    .site-header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 55%, #43a047 100%);
      color: #fff;
      padding: 1.5rem 1rem;
      text-align: center;
      position: relative;
    }
    .nav-back-btn {
      position: absolute; top: 1rem; left: 1rem; z-index: 2;
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; font-size: 0.75rem; font-weight: 600;
      padding: 0.3rem 0.8rem; border-radius: 50px; text-decoration: none;
      transition: background .18s;
    }
    .nav-back-btn:hover { background: rgba(255,255,255,.28); color: #fff; }

    .header-inner { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .school-logo-img { width: 50px; height: 50px; border-radius: 50%; background: #fff; margin-bottom: 0.2rem; }
    .school-name { font-size: 1.2rem; font-weight: 800; }
    .school-sub  { font-size: 0.75rem; color: rgba(255,255,255,.8); }
    .badge-period {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.32);
      color: #fff; font-size: 0.7rem; font-weight: 600;
      padding: 0.15rem 0.8rem; border-radius: 50px; margin-top: 0.2rem;
    }

    /* ── MONTH NAV ───────────────────────────────────────────────────────── */
    .month-nav {
      background: var(--c-surface); border-bottom: 2px solid var(--c-border);
      padding: 0.6rem 1rem;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      position: sticky; top: 0; z-index: 100;
    }
    .month-nav-label { font-size: 0.72rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    
    .month-dropdown .btn-dropdown {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1.2rem; border-radius: 50px;
      border: 1.5px solid var(--c-border);
      background: var(--c-surface); color: var(--c-green-dark);
      font-size: 0.8rem; font-weight: 600;
      transition: all .2s;
    }
    .month-dropdown .btn-dropdown:hover { background: var(--c-green-light); }
    .month-dropdown .dropdown-menu {
      border-radius: 12px; border: 1px solid var(--c-border);
      box-shadow: 0 4px 12px rgba(0,0,0,.1); padding: 0.4rem;
    }
    .month-dropdown .dropdown-item {
      border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      padding: 0.5rem 1rem; color: var(--c-muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .month-dropdown .dropdown-item:hover { background: var(--c-green-light); color: var(--c-green-dark); }
    .month-dropdown .dropdown-item.active { background: var(--c-green); color: #fff; }
    .month-dropdown .live-indicator {
      font-size: 0.55rem; font-weight: 800; background: #22c55e; color: #fff;
      padding: 1px 4px; border-radius: 4px; margin-left: 8px;
    }

    /* ── TABS ────────────────────────────────────────────────────────────── */
    .tab-wrapper { background: var(--c-green); padding: 0 0.5rem; border-bottom: 2px solid var(--c-green-mid); }
    .nav-tabs { border-bottom: none; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tabs .nav-link {
      color: rgba(255,255,255,0.65); border: none; border-bottom: 3px solid transparent; border-radius: 0;
      padding: 0.75rem 1.1rem; font-size: 0.82rem; font-weight: 600; white-space: nowrap;
      background: transparent !important;
    }
    .nav-tabs .nav-link:hover { color: #fff; border-bottom-color: rgba(255,255,255,0.3); }
    .nav-tabs .nav-link.active { color: #fff; border-bottom-color: #fff; background: transparent !important; }

    /* ── MAIN ────────────────────────────────────────────────────────────── */
    .main-content { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem 3rem; }

    /* ── SEARCH & TOOLS ──────────────────────────────────────────────────── */
    .tool-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem; gap: 1rem;
    }
    .search-box { position: relative; flex-grow: 1; max-width: 500px; }
    .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--c-muted); }
    .search-box input {
      width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; border-radius: 10px;
      border: 1px solid var(--c-border); background: var(--c-surface);
      font-size: 0.85rem; transition: border-color .2s;
    }
    .search-box input:focus { outline: none; border-color: var(--c-green); }

    .btn-print {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem; border-radius: 10px; border: 1px solid var(--c-green);
      background: var(--c-surface); color: var(--c-green); font-size: 0.8rem; font-weight: 600;
      transition: all .2s;
    }
    .btn-print:hover { background: var(--c-green); color: #fff; }

    /* ── SUMMARY CARDS ───────────────────────────────────────────────────── */
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .sum-card {
      background: var(--c-surface); padding: 1rem; border-radius: 12px;
      border: 1px solid var(--c-border); text-align: center;
    }
    .sum-val { font-size: 1.5rem; font-weight: 800; color: var(--c-green); display: block; }
    .sum-lbl { font-size: 0.65rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── TABLE ───────────────────────────────────────────────────────────── */
    .report-card {
      background: var(--c-surface); border-radius: 14px; border: 1px solid var(--c-border);
      overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .report-header { padding: 1.25rem; border-bottom: 1px solid var(--c-border); display: flex; justify-content: space-between; align-items: center; }
    .report-header h2 { font-size: 1.1rem; font-weight: 800; margin: 0; }
    .report-header p { font-size: 0.75rem; color: var(--c-muted); margin: 0.1rem 0 0; }

    .table-responsive { overflow-x: auto; }
    .table { margin-bottom: 0; width: 100%; border-collapse: collapse; }
    .table thead th {
      background: var(--c-green); color: #fff; font-size: 0.75rem; font-weight: 700;
      padding: 0.8rem 1rem; text-transform: uppercase; letter-spacing: 0.5px;
      position: sticky; top: 0; z-index: 10; border: none;
    }
    .table tbody td { padding: 0.8rem 1rem; font-size: 0.85rem; vertical-align: middle; border-bottom: 1px solid var(--c-green-light); }
    .table tbody tr:nth-child(even) { background: #f9fff9; }
    .table tbody tr:hover { background: var(--c-green-light); }

    .rank-circle {
      width: 24px; height: 24px; border-radius: 50%; background: var(--c-green-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: var(--c-green-dark);
    }
    .badge-pill { font-size: 0.65rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 50px; }
    .badge-pass { background: #dcfce7; color: #15803d; }
    .badge-fail { background: #fee2e2; color: #b91c1c; }
    .grade-a    { background: #dcfce7; color: #14532d; }
    .grade-b    { background: #d1fae5; color: #065f46; }
    .grade-c    { background: #ecfccb; color: #365314; }
    .grade-d    { background: #fef9c3; color: #713f12; }
    .grade-f    { background: #fee2e2; color: #991b1b; }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    .site-footer { text-align: center; padding: 2rem 1rem; font-size: 0.75rem; color: var(--c-muted); margin-top: 2rem; }

    /* ── PRINT STYLES ────────────────────────────────────────────────────── */
    @media print {
      .site-header, .month-nav, .tab-wrapper, .tool-bar, .site-footer, .nav-back-btn { display: none !important; }
      body { background: #fff; padding: 0; }
      .main-content { max-width: 100%; margin: 0; padding: 0; }
      .report-card { border: none; box-shadow: none; }
      .table thead th { background: #f0f0f0 !important; color: #000 !important; border: 1px solid #ddd; }
      .table tbody td { border: 1px solid #ddd; }
    }

    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .tool-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="nav-back-btn"><i class="bi bi-arrow-left"></i> Leaderboard</a>
    <div class="header-inner">
      <img src="logo.png" alt="School Logo" class="school-logo-img" onerror="this.style.display='none'" />
      <div class="school-name" id="schoolName">Greenway School</div>
      <div class="school-sub"  id="academicYear">Monthly Reports</div>
      <div class="badge-period" id="periodBadge">Performance Data</div>
    </div>
  </header>

  <!-- MONTH NAVIGATION -->
  <nav class="month-nav">
    <span class="month-nav-label"><i class="bi bi-calendar3 me-1"></i>Select Period:</span>
    <div class="dropdown month-dropdown" id="monthDropdownWrap">
      <button class="btn-dropdown dropdown-toggle" type="button" id="monthDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-calendar-event me-1"></i> Loading...
      </button>
      <ul class="dropdown-menu" id="monthDropdownMenu" aria-labelledby="monthDropdownBtn">
        <!-- JS injected -->
      </ul>
    </div>
  </nav>

  <div class="tab-wrapper">
    <ul class="nav nav-tabs" id="classTabs" role="tablist"></ul>
  </div>

  <div class="main-content">
    <div id="loadingBox" class="text-center py-5">
      <div class="spinner-border text-success mb-3"></div>
      <p class="text-muted small fw-bold">Loading report data...</p>
    </div>

    <div id="errorBox" class="d-none text-center py-5">
      <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
      <h5 class="mt-2">Failed to load data</h5>
      <p id="errorMsg" class="text-muted small"></p>
      <button class="btn btn-sm btn-outline-danger mt-2" onclick="location.reload()">Try Again</button>
    </div>

    <div id="reportContent" class="d-none">
      <div class="tool-bar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="studentSearch" placeholder="Search student name..." onkeyup="filterTable()">
        </div>
        <button class="btn-print" onclick="window.print()">
          <i class="bi bi-printer"></i> Print Report
        </button>
      </div>

      <div class="summary-grid" id="summaryGrid">
        <!-- JS injected -->
      </div>

      <div class="tab-content" id="tabPanes">
        <!-- JS injected -->
      </div>
    </div>
  </div>

  <footer class="site-footer">
    © 2026 Greenway School &nbsp;·&nbsp; Developed by <strong>Phoun Borin</strong>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const MONTHS = [
      { label: 'January 2026', spreadsheetId: '1jeOXFdhK9vZiq6xng-z8m6yUpk9HA354BttDnFvAwFY', sheets: ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'], isCurrent: false },
      { label: 'February 2026', spreadsheetId: '1VdWhQX5JXZFf4bmvIfLkKUJK8Ul68exAmDATMO_1S8g', sheets: ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'], isCurrent: false },
      { label: 'March 2026', spreadsheetId: '1SK7kWxD_mYWKqMJN_P2L5-8RGRwUylzX9SUXOiRevwM', sheets: ['BA', 'BB', 'Grade 1', 'Grade 2', 'Grade 3', 'Grade 4'], isCurrent: true }
    ];

    let activeMonthIdx = MONTHS.findIndex(m => m.isCurrent);
    if (activeMonthIdx === -1) activeMonthIdx = MONTHS.length - 1;
    let allClassData = [];

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function buildMonthNav() {
      const btn = document.getElementById('monthDropdownBtn');
      const menu = document.getElementById('monthDropdownMenu');
      const current = MONTHS[activeMonthIdx];
      btn.innerHTML = `<i class="bi bi-calendar-event me-1"></i> ${escHtml(current.label)} ${current.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}`;
      menu.innerHTML = MONTHS.map((m, idx) => `
        <li><a class="dropdown-item ${idx === activeMonthIdx ? 'active' : ''}" href="#" onclick="switchMonth(${idx}); return false;">
          <span>${escHtml(m.label)}</span> ${m.isCurrent ? '<span class="live-indicator">LIVE</span>' : ''}
        </a></li>`).join('');
    }

    function switchMonth(idx) {
      if (idx === activeMonthIdx) return;
      activeMonthIdx = idx;
      buildMonthNav();
      loadAllData();
    }

    async function fetchSheet(sheetName, spreadsheetId) {
      const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      const resp = await fetch(url);
      const text = await resp.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      const rows = json.table.rows;

      // Header info (from top of sheet)
      // Level name is usually in row 3, but let's fall back to sheet name if it's a student row
      let levelName = sheetName;
      if (rows[3] && rows[3].c && rows[3].c[0] && rows[3].c[0].v) {
        const val = String(rows[3].c[0].v).trim();
        if (!/^\d+$/.test(val)) levelName = val;
      }
      
      const academicYear = rows[2]?.c[0]?.v || '';

      // Find all students (looking for rows that start with a number like '01', '02')
      const students = rows.map(r => {
        const idVal = String(r.c[0]?.v || '').trim();
        // Check if first column is a numeric ID (like '01')
        if (!/^\d+$/.test(idVal)) return null;

        const avg = r.c[3]?.v || 0;
        return {
          id:     idVal,
          name:   r.c[1]?.v || '',
          gender: r.c[2]?.v || '',
          avg:    typeof avg === 'number' ? avg : parseFloat(avg),
          grade:  r.c[4]?.v || '',
          rank:   r.c[5]?.v || '',
          result: r.c[6]?.v || ''
        };
      }).filter(s => s && s.name && !s.name.includes('Date:') && !s.name.includes('Seen and checked'));

      return { sheetName, levelName, academicYear, students };
    }

    function buildSummary(students) {
      const total = students.length;
      const passed = students.filter(s => /pass/i.test(s.result)).length;
      const failed = total - passed;
      const avg = total > 0 ? (students.reduce((acc, s) => acc + s.avg, 0) / total).toFixed(2) : '0.00';

      return `
        <div class="sum-card"><span class="sum-val">${total}</span><span class="sum-lbl">Students</span></div>
        <div class="sum-card"><span class="sum-val text-success">${passed}</span><span class="sum-lbl">Passed</span></div>
        <div class="sum-card"><span class="sum-val text-danger">${failed}</span><span class="sum-lbl">Failed</span></div>
        <div class="sum-card"><span class="sum-val text-primary">${avg}</span><span class="sum-lbl">Avg Score</span></div>`;
    }

    function buildTable(students) {
      if (students.length === 0) return '<div class="p-5 text-center text-muted">No student data found for this class.</div>';
      
      return `
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Student Name</th>
                <th>Gender</th>
                <th>Average</th>
                <th>Grade</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody class="student-table-body">
              ${students.map(s => `
                <tr>
                  <td><div class="rank-circle">${s.id}</div></td>
                  <td class="fw-bold">${escHtml(s.name)}</td>
                  <td><i class="bi bi-gender-${s.gender.toLowerCase() === 'female' ? 'female text-danger' : 'male text-primary'}"></i></td>
                  <td class="fw-bold">${s.avg.toFixed(2)}</td>
                  <td><span class="badge-pill grade-${(s.grade||'F').toLowerCase()}">${s.grade || 'N/A'}</span></td>
                  <td><span class="badge-pill ${/pass/i.test(s.result) ? 'badge-pass' : 'badge-fail'}"><i class="bi bi-${/pass/i.test(s.result) ? 'check-circle' : 'x-circle'} me-1"></i>${s.result || 'N/A'}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    }

    async function loadAllData() {
      const cfg = MONTHS[activeMonthIdx];
      const loading = document.getElementById('loadingBox');
      const error   = document.getElementById('errorBox');
      const content = document.getElementById('reportContent');
      
      loading.classList.remove('d-none');
      error.classList.add('d-none');
      content.classList.add('d-none');

      try {
        allClassData = await Promise.all(cfg.sheets.map(s => fetchSheet(s, cfg.spreadsheetId)));
        
        const tabsEl = document.getElementById('classTabs');
        tabsEl.innerHTML = allClassData.map((d, i) => `
          <li class="nav-item">
            <button class="nav-link ${i === 0 ? 'active' : ''}" data-bs-toggle="tab" data-bs-target="#pane-${i}" type="button" onclick="updateSummary(${i})">
              ${escHtml(d.levelName || d.sheetName)}
            </button>
          </li>`).join('');

        const panesEl = document.getElementById('tabPanes');
        panesEl.innerHTML = allClassData.map((d, i) => `
          <div class="tab-pane fade ${i === 0 ? 'show active' : ''}" id="pane-${i}" role="tabpanel">
            <div class="report-card">
              <div class="report-header">
                <div>
                  <h2>${escHtml(d.levelName)}</h2>
                  <p>Monthly Performance Report</p>
                </div>
                <div class="d-flex gap-2">
                  <span class="badge-period"><i class="bi bi-calendar-check me-1"></i>${escHtml(cfg.label)}</span>
                  <span class="badge-period"><i class="bi bi-mortarboard me-1"></i>${escHtml(d.academicYear)}</span>
                </div>
              </div>
              ${buildTable(d.students)}
            </div>
          </div>`).join('');

        updateSummary(0);
        loading.classList.add('d-none');
        content.classList.remove('d-none');
      } catch (err) {
        console.error(err);
        loading.classList.add('d-none');
        error.classList.remove('d-none');
        document.getElementById('errorMsg').textContent = err.message;
      }
    }

    function updateSummary(idx) {
      document.getElementById('summaryGrid').innerHTML = buildSummary(allClassData[idx].students);
      document.getElementById('studentSearch').value = '';
    }

    function filterTable() {
      const input = document.getElementById('studentSearch').value.toUpperCase();
      const activePane = document.querySelector('.tab-pane.active');
      const rows = activePane.querySelectorAll('.student-table-body tr');

      rows.forEach(row => {
        const name = row.cells[1].textContent || row.cells[1].innerText;
        row.style.display = name.toUpperCase().indexOf(input) > -1 ? "" : "none";
      });
    }

    // Init
    buildMonthNav();
    loadAllData();
  </script>
</body>
</html>
